<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>IVR Debate Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      background: #fafafa;
    }

    .card h2 {
      font-size: 20px;
      margin-top: 0;
    }

    .card p {
      text-align: left;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      background: #2d6cdf;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #1f56b5;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>IVR Debate Room</h1>
    <p>
      Choose one debate practice unit below.
    </p>

    <div class="grid">
      <div class="card">
        <h2>Unit 1</h2>
        <p>Malay Cultural Values and Youth Identity</p>
       <a class="btn" href="file:///C:/DESI/PFR%202026/ivr-debate-room/unit1.html.html">Open Unit 1</a>
      </div>

      <div class="card">
        <h2>Unit 2</h2>
        <p>Social Media and Cultural Promotion</p>
        <a class="btn" href="file:///C:/DESI/PFR%202026/ivr-debate-room/unit2.html.html">Open Unit 2</a>
      </div>

      <div class="card">
        <h2>Unit 3</h2>
        <p>Local Culture in English Classes</p>
        <a class="btn" href="file:///C:/DESI/PFR%202026/ivr-debate-room/unit3.html.html">Open Unit 3</a>
      </div>

      <div class="card">
        <h2>Unit 4</h2>
        <p>Introducing Local Culture Globally</p>
        <a class="btn" href="file:///C:/DESI/PFR%202026/ivr-debate-room/unit4.html.html">Open Unit 4</a>
      </div>
    </div>
  </div>
</body>
</html>
